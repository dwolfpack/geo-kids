<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">מסע סביב העולם 🌍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&family=Rubik:wght@700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&family=Rubik:wght@700;800&display=swap" rel="stylesheet"></noscript>
<link rel="stylesheet" href="css/explorer.css">
<link rel="stylesheet" href="css/records.css">
<link rel="stylesheet" href="css/profiles.css">
<style>
  :root {
    --bg: #E4EFEE;
    --card: #FFFCF3;
    --ink: #1E2C2A;
    --ink-soft: #5B6D69;
    --coral: #D6553B;
    --coral-dark: #B8442E;
    --sky: #2E7D96;
    --leaf: #4C9166;
    --sun: #E0A83E;
    --berry: #A6567D;
    --line: #D7E3DE;
    --radius: 20px;
    --shadow: 0 4px 14px rgba(20,35,33,.09);
    --font-display: 'Rubik', 'Heebo', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Heebo', sans-serif;
    background-color: var(--bg);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(30,44,42,.07) 1px, transparent 0);
    background-size: 22px 22px;
    color: var(--ink);
    min-height: 100vh;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ---------- header ---------- */
  header {
    text-align: center; margin-bottom: 32px;
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: calc(var(--radius) + 6px);
    box-shadow: var(--shadow);
    padding: 22px 20px 26px;
    position: relative;
    transform: rotate(-.4deg);
  }
  header::before {
    content: ""; position: absolute; inset: 8px;
    border: 2px dashed var(--line); border-radius: calc(var(--radius) + 1px);
    pointer-events: none;
  }
  .lang-toggle {
    display: inline-flex; gap: 6px; background: var(--bg);
    border: 2px solid var(--line); border-radius: 999px;
    padding: 4px; margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .lang-btn {
    font-family: inherit; font-size: .82rem; font-weight: 700;
    border: none; border-radius: 999px; padding: 6px 14px;
    background: transparent; color: var(--ink-soft); cursor: pointer;
    min-height: 32px; transition: background .15s, color .15s;
  }
  .lang-btn.active { background: var(--coral); color: #fff; }
  .lang-btn:not(.active):hover { background: var(--card); }
  header h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -1px;
  }
  header h1 .globe { display: inline-block; animation: spin 14s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  header p { color: var(--ink-soft); font-size: 1.1rem; margin-top: 6px; }
  .stars-total {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-display);
    background: var(--sun); color: #3A2A0E; border: 2px solid var(--line);
    border-radius: 999px; padding: 6px 18px; margin-top: 14px;
    font-weight: 600; box-shadow: var(--shadow);
  }

  /* ---------- home: game cards ---------- */
  .games {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  }
  .game-card {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 26px 20px 22px;
    text-align: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative;
    font-family: inherit;
    color: inherit;
    width: 100%;
  }
  .game-card:nth-child(odd) { transform: rotate(-.6deg); }
  .game-card:nth-child(even) { transform: rotate(.6deg); }
  .game-card::before {
    content: ""; position: absolute; top: 0; inset-inline-end: 0;
    width: 0; height: 0; border-style: solid;
    border-width: 0 26px 26px 0;
    border-color: transparent var(--bg) transparent transparent;
    filter: drop-shadow(-1px 1px 1px rgba(20,35,33,.12));
  }
  .game-card .emoji {
    font-size: 2.6rem; display: inline-flex; align-items: center; justify-content: center;
    width: 74px; height: 74px; margin-bottom: 12px;
    border: 3px dashed var(--accent, var(--coral));
    border-radius: 50%;
    color: var(--accent, var(--coral));
  }
  .game-card:hover { transform: translateY(-4px) scale(1.02) rotate(0deg); box-shadow: 0 10px 24px rgba(20,35,33,.16); border-color: var(--accent, var(--coral)); }
  .game-card h2 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; }
  .game-card p { color: var(--ink-soft); font-size: .95rem; margin-top: 6px; }
  .game-card .best { margin-top: 12px; font-size: 1.05rem; letter-spacing: 2px; }

  @media (max-width: 480px) {
    .games { grid-template-columns: 1fr 1fr; gap: 12px; }
    .game-card { padding: 16px 10px; }
    .game-card .emoji { width: 52px; height: 52px; font-size: 1.8rem; margin-bottom: 6px; }
    .game-card h2 { font-size: 1.05rem; }
    .game-card p { font-size: .8rem; margin-top: 4px; }
    .game-card .best { margin-top: 8px; font-size: .9rem; }
  }

  .sticker-rail {
    display: flex; justify-content: center;
    margin-top: 12px;
  }
  .sticker-rail img {
    width: 26px; height: 18px; object-fit: cover;
    border-radius: 3px; border: 1px solid var(--line);
    box-shadow: 0 1px 3px rgba(20,35,33,.2);
    margin-inline-start: -8px;
  }
  .sticker-rail img:first-child { margin-inline-start: 0; }
  @media (max-width: 480px) {
    .sticker-rail img { width: 20px; height: 14px; }
  }

  /* ---------- country info panel ---------- */
  .country-panel {
    margin-top: 16px;
    background: var(--card); border: 2px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 24px 20px; animation: rise .35s ease;
  }
  .country-panel.placeholder { text-align: center; color: var(--ink-soft); font-size: 1.1rem; }
  .cp-head { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .cp-head img { width: 92px; border-radius: 10px; border: 2px solid var(--line); box-shadow: var(--shadow); }
  .cp-head h3 { font-size: 1.9rem; font-weight: 800; }
  .cp-grid {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  }
  .cp-item {
    background: var(--bg); border: 2px solid var(--line); border-radius: 14px;
    padding: 10px 14px; display: flex; gap: 10px; align-items: baseline;
  }
  .cp-item .ico { font-size: 1.3rem; }
  .cp-item .lbl { color: var(--ink-soft); font-size: .85rem; display: block; }
  .cp-item .val { font-weight: 700; font-size: 1.05rem; }
  .cp-fact {
    margin-top: 14px; background: #FBF3E4; border: 2px solid var(--sun);
    border-radius: 14px; padding: 12px 16px; font-size: 1.05rem;
  }
  .cp-wiki {
    display: inline-block; margin-top: 14px; color: var(--sky); font-weight: 700;
    text-decoration: none; border-bottom: 2px solid transparent;
  }
  .cp-wiki:hover { border-color: var(--sky); }

  /* ---------- difficulty screen ---------- */
  .diff-card {
    background: var(--card); border: 2px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 36px 24px; text-align: center;
  }
  .diff-card h2 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; margin-bottom: 24px; }
  .diff-options { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
  .diff-btn {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    background: var(--bg); border: 3px dashed var(--line); border-radius: 18px;
    padding: 20px 12px; cursor: pointer; font-family: inherit;
    transition: transform .15s, border-color .15s;
    min-height: 44px; touch-action: manipulation;
  }
  @media (max-width: 480px) {
    .diff-card { padding: 22px 14px; }
    .diff-options { grid-template-columns: 1fr 1fr; gap: 10px; }
    .diff-btn { padding: 14px 8px; }
    .diff-emoji { width: 42px; height: 42px; font-size: 1.4rem; }
    .diff-label { font-size: 1rem; }
    .diff-desc { font-size: .78rem; }
  }
  .diff-btn:hover { transform: translateY(-3px) rotate(-1deg); }
  .diff-btn.lvl-1:hover { border-color: var(--leaf); }
  .diff-btn.lvl-2:hover { border-color: var(--sun); }
  .diff-btn.lvl-3:hover { border-color: #E8933F; }
  .diff-btn.lvl-4:hover { border-color: var(--coral); }
  .diff-btn.lvl-5:hover { border-color: var(--berry); }
  .diff-emoji {
    width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
    font-size: 1.7rem; border-radius: 50%; border: 3px solid var(--line); background: var(--card);
  }
  .diff-label { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; }
  .diff-desc { color: var(--ink-soft); font-size: .88rem; }

  /* ---------- game screen ---------- */
  .hidden { display: none !important; }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; gap: 10px;
  }
  .btn-back {
    background: var(--card); border: 2px solid var(--line);
    border-radius: 999px; padding: 12px 24px;
    font-family: inherit; font-size: 1.05rem; font-weight: 600;
    cursor: pointer; transition: border-color .15s;
    min-height: 44px; touch-action: manipulation;
  }
  .btn-back:hover { border-color: var(--coral); }
  .progress-pill {
    background: var(--card); border: 2px solid var(--line);
    border-radius: 999px; padding: 8px 20px; font-weight: 600;
    font-family: var(--font-display);
  }
  .progress-track { height: 10px; background: var(--line); border-radius: 999px; overflow: hidden; margin-bottom: 24px; }
  .progress-fill { height: 100%; width: 0; background: var(--coral); border-radius: 999px; transition: width .4s ease; }

  .question-card {
    background: var(--card); border: 2px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 30px 22px; text-align: center; margin-bottom: 20px;
  }
  .question-card h3 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 600; margin-bottom: 18px; }
  .flag-img {
    width: min(260px, 70vw); border-radius: 6px;
    border: 8px solid #fff; box-shadow: 0 6px 16px rgba(20,35,33,.18);
  }
  .big-word { font-family: var(--font-display); font-size: 2.2rem; font-weight: 600; color: var(--coral-dark); }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .opt {
    background: var(--card); border: 2px solid var(--line);
    border-radius: 16px; padding: 18px 14px;
    font-family: inherit; font-size: 1.2rem; font-weight: 600;
    cursor: pointer; transition: transform .12s, border-color .12s, background .2s;
    box-shadow: var(--shadow);
  }

  @media (max-width: 480px) {
    .topbar { margin-bottom: 10px; }
    .progress-track { margin-bottom: 14px; }
    .question-card { padding: 16px 14px; margin-bottom: 12px; }
    .question-card h3 { font-size: 1.1rem; margin-bottom: 10px; }
    .flag-img { width: min(140px, 42vw); }
    .big-word { font-size: 1.5rem; }
    .options { gap: 8px; }
    .opt { padding: 10px 8px; font-size: 1rem; }
    .reveal-chips { margin-top: 8px; }
    .fact-bubble { margin-top: 10px; padding: 10px 14px; font-size: .92rem; }
    .btn-next { margin-top: 10px; padding: 10px 28px; font-size: 1rem; }
  }
  .opt:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--sky); }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #E4EFE0; border-color: var(--leaf); animation: pop .35s; }
  .opt.wrong { background: #F6E2DC; border-color: var(--coral); animation: shake .35s; }
  @keyframes pop {
    0% { transform: scale(1) rotate(0deg); }
    35% { transform: scale(1.15) rotate(-3deg); }
    60% { transform: scale(0.97) rotate(1deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes shake { 25% { transform: translateX(6px); } 75% { transform: translateX(-6px); } }

  .reveal-chips {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    margin-top: 16px; animation: rise .35s ease;
  }
  .reveal-chips .rc {
    background: var(--bg); border: 2px solid var(--line); border-radius: 999px;
    padding: 6px 16px; font-weight: 700; font-size: .95rem;
  }
  .fact-bubble {
    background: #FBF3E4; border: 2px solid var(--sun);
    border-radius: 16px; padding: 14px 18px; margin-top: 18px;
    font-size: 1.05rem; text-align: center; animation: rise .35s ease;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }
  .btn-next {
    margin-top: 16px; background: var(--coral); color: #fff;
    border: none; border-radius: 999px; padding: 12px 36px;
    font-family: var(--font-display); font-size: 1.1rem; font-weight: 600;
    cursor: pointer; box-shadow: var(--shadow); transition: background .15s, transform .12s;
  }
  .btn-next:hover { background: var(--coral-dark); transform: translateY(-2px); }

  /* ---------- memory game ---------- */
  .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 520px) { .memory-grid { gap: 8px; } }
  .mem-card {
    aspect-ratio: 3/2.6; border-radius: 14px; cursor: pointer;
    perspective: 600px; background: transparent; border: none; padding: 0;
    font-family: inherit;
  }
  .mem-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d; transition: transform .4s;
  }
  .mem-card.flipped .mem-inner { transform: rotateY(180deg); }
  .mem-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--line); box-shadow: var(--shadow);
  }
  .mem-front { background: var(--coral); color: #fff; font-size: 1.8rem; }
  .mem-back {
    background: var(--card); transform: rotateY(180deg);
    font-size: .95rem; font-weight: 700; padding: 4px; text-align: center;
  }
  .mem-back img { width: 84%; border-radius: 8px; border: 1px solid var(--line); }
  .mem-card.matched .mem-back { background: #E4EFE0; border-color: var(--leaf); }
  .mem-card.matched { cursor: default; animation: pop .4s; }

  /* ---------- results ---------- */
  .result-card {
    background: var(--card); border: 2px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 44px 24px; text-align: center; animation: rise .4s ease;
  }
  .result-card .big-emoji {
    display: inline-flex; align-items: center; justify-content: center;
    width: 108px; height: 108px; font-size: 3.6rem;
    border: 4px dashed var(--coral); border-radius: 50%;
    transform: rotate(-6deg);
  }
  .result-card h2 { font-family: var(--font-display); font-size: 1.9rem; font-weight: 600; margin: 16px 0 6px; }
  .result-card .stars { font-size: 2.4rem; letter-spacing: 6px; margin: 10px 0; }
  .result-card p { color: var(--ink-soft); font-size: 1.15rem; }
  .result-actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
  .btn-ghost {
    background: var(--card); color: var(--ink); border: 2px solid var(--line);
    border-radius: 999px; padding: 12px 32px;
    font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; cursor: pointer;
  }
  .btn-ghost:hover { border-color: var(--coral); }

  /* ---------- confetti ---------- */
  .confetti {
    position: fixed; top: -20px; border-radius: 3px;
    pointer-events: none; z-index: 99;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: .6; }
  }

  footer { text-align: center; margin-top: 40px; color: var(--ink-soft); font-size: .9rem; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ HOME ============ -->
  <div id="screen-home">
    <header>
      <div style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
        <div id="lang-toggle" class="lang-toggle"></div>
        <button id="sound-toggle" class="lang-toggle" style="padding:4px 14px; cursor:pointer; border:2px solid var(--line); background:var(--bg);" onclick="onSoundToggleClick()"></button>
      </div>
      <div id="auth-bar" class="auth-bar"></div>
      <h1><span class="globe">🌍</span> <span id="app-title-text">מסע סביב העולם</span></h1>
      <p id="app-subtitle">משחקים והרפתקאות בגאוגרפיה — בואו להכיר מדינות, דגלים וערי בירה!</p>
      <div class="stars-total">⭐ <span id="total-stars">0</span> <span id="stars-label">כוכבים שאספתם</span></div>
    </header>

    <div class="games">
      <button class="game-card" style="--accent: var(--coral)" onclick="startGame('flags')">
        <span class="emoji">🚩</span>
        <h2 id="gc-flags-title">חידון דגלים</h2>
        <p id="gc-flags-desc">איזו מדינה מתחבאת מאחורי הדגל?</p>
        <div class="best" id="best-flags"></div>
        <div class="sticker-rail" id="rail-flags"></div>
      </button>
      <button class="game-card" style="--accent: var(--sky)" onclick="startGame('capitals')">
        <span class="emoji">🏙️</span>
        <h2 id="gc-capitals-title">ערי בירה</h2>
        <p id="gc-capitals-desc">מה עיר הבירה של כל מדינה?</p>
        <div class="best" id="best-capitals"></div>
        <div class="sticker-rail" id="rail-capitals"></div>
      </button>
      <button class="game-card" style="--accent: var(--leaf)" onclick="startGame('continents')">
        <span class="emoji">🗺️</span>
        <h2 id="gc-continents-title">לאיזו יבשת?</h2>
        <p id="gc-continents-desc">מצאו באיזו יבשת נמצאת כל מדינה</p>
        <div class="best" id="best-continents"></div>
        <div class="sticker-rail" id="rail-continents"></div>
      </button>
      <button class="game-card" style="--accent: var(--berry)" onclick="startGame('memory')">
        <span class="emoji">🧠</span>
        <h2 id="gc-memory-title">משחק זיכרון</h2>
        <p id="gc-memory-desc">התאימו כל דגל למדינה שלו</p>
        <div class="best" id="best-memory"></div>
        <div class="sticker-rail" id="rail-memory"></div>
      </button>
      <button class="game-card" style="--accent: var(--sun)" onclick="startExplorer()">
        <span class="emoji">🔎</span>
        <h2 id="gc-explorer-title">גלו מדינה</h2>
        <p id="gc-explorer-desc">הקלידו שם של מדינה וגלו הכל עליה</p>
      </button>
    </div>

    <footer>
      <span id="footer-text">נבנה באהבה ❤️ ללומדים צעירים</span>
      <br>
      <a href="https://www.linkedin.com/in/dror-wolfshtat/" target="_blank" rel="noopener" style="color:var(--ink-soft); text-decoration:underline;">LinkedIn ↗</a>
    </footer>
  </div>

  <!-- ============ DIFFICULTY ============ -->
  <div id="screen-difficulty" class="hidden">
    <div class="topbar">
      <button class="btn-back" onclick="goHome()">🏠 חזרה</button>
    </div>
    <div class="diff-card">
      <h2 id="diff-heading">באיזו רמה רוצים לשחק?</h2>
      <div class="diff-options" id="diff-options"></div>
    </div>
  </div>

  <!-- ============ QUIZ ============ -->
  <div id="screen-quiz" class="hidden">
    <div class="topbar">
      <button class="btn-back" onclick="goHome()">🏠 חזרה</button>
      <div class="progress-pill"><span id="q-num">1</span> / <span id="q-total">8</span></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="question-card" id="question-card"></div>
    <div class="options" id="options"></div>
    <div id="fact-area"></div>
  </div>

  <!-- ============ MEMORY ============ -->
  <div id="screen-memory" class="hidden">
    <div class="topbar">
      <button class="btn-back" onclick="goHome()">🏠 חזרה</button>
      <div class="progress-pill"><span id="pairs-label">זוגות:</span> <span id="pairs-found">0</span> / 8</div>
    </div>
    <div class="memory-grid" id="memory-grid"></div>
  </div>

  <!-- ============ EXPLORER ============ -->
  <div id="screen-explorer" class="hidden">
    <div class="topbar">
      <button class="btn-back" onclick="goHome()">🏠 חזרה</button>
    </div>
    <div class="explorer-card">
      <h2 id="explorer-heading">🔎 גלו מדינה</h2>
      <input id="explorer-search" class="explorer-input" type="text" placeholder="הקלידו שם של מדינה..." autocomplete="off">
      <div id="explorer-suggestions" class="explorer-suggestions"></div>
    </div>
    <div class="country-panel placeholder" id="explorer-panel">
      👆 התחילו להקליד כדי לגלות מדינה!
    </div>
  </div>

const flagUrl = c => `https://flagcdn.com/w320/${c}.png`;
const flagUrlSmall = c => `https://flagcdn.com/w160/${c}.png`;

/* ================= helpers ================= */
const $ = id => document.getElementById(id);
const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

const SCREENS = ["screen-home","screen-difficulty","screen-quiz","screen-memory","screen-explorer","screen-records","screen-profile","screen-result"];
function show(id) {
  SCREENS.forEach(s => $(s).classList.toggle("hidden", s !== id));
  window.scrollTo(0, 0);
}

/* ---------- stars storage (scoped per local player profile) ---------- */
const ACTIVE_PROFILE_KEY = "geo-active-profile";
function activeProfileSlug() {
  const name = localStorage.getItem(ACTIVE_PROFILE_KEY) || "אורח";
  return encodeURIComponent(name);
}
const store = {
  get: k => parseInt(localStorage.getItem(`geo-${activeProfileSlug()}-${k}`) || "0", 10),
  set: (k, v) => localStorage.setItem(`geo-${activeProfileSlug()}-${k}`, v),
};
function renderStickerRail(railId) {
  const el = $(railId);
  if (!el) return;
  const picks = shuffle(COUNTRIES).slice(0, 6);
  el.innerHTML = picks.map(c => `<img src="${flagUrlSmall(c.code)}" alt="${c.name[LANG]}">`).join("");
}
function renderHome() {
  let total = 0;
  ["flags","capitals","continents","memory"].forEach(g => {
    const s = store.get(g);
    total += s;
    $("best-" + g).textContent = s ? "⭐".repeat(s) : t("notPlayedYet");
    renderStickerRail("rail-" + g);
  });
  $("total-stars").textContent = total;
}
function goHome() {
  renderHome();
  if (typeof renderProfileBar === "function") renderProfileBar();
  show("screen-home");
}

let pendingGame = null;
function startGame(g) {
  if (g === "memory") return startMemory();
  pendingGame = g;
  renderDifficultyOptions();
  show("screen-difficulty");
}

function renderDifficultyOptions() {
  let cumulative = 0;
  $("diff-options").innerHTML = LEVELS.map(l => {
    cumulative += l.codes.length;
    return `<button class="diff-btn ${l.cls}" onclick="startQuiz(pendingGame, ${l.key})">
      <span class="diff-emoji">${l.emoji}</span>
      <span class="diff-label">${t(l.labelKey)}</span>
      <span class="diff-desc">${cumulative} ${t("countriesSuffix")}</span>
    </button>`;
  }).join("");
}

/* ================= quiz engine ================= */
let game = null;

const GAME_DEFS = {
  flags: {
    question: c => `<h3>${t("questionFlag")}</h3><img class="flag-img" src="${flagUrl(c.code)}" alt="flag">`,
    answer: c => c.name[LANG],
    pool: () => game.pool.map(x => x.name[LANG]),
  },
  capitals: {
    question: c => `<h3>${t("questionCapital")}</h3><div class="big-word">${c.name[LANG]}</div><br><img class="flag-img" style="width:140px" src="${flagUrlSmall(c.code)}" alt="${c.name[LANG]}">`,
    answer: c => c.capital[LANG],
    pool: () => game.pool.map(x => x.capital[LANG]),
  },
  continents: {
    question: c => `<h3>${t("questionContinent")}</h3><div class="big-word">${c.name[LANG]}</div><br><img class="flag-img" style="width:140px" src="${flagUrlSmall(c.code)}" alt="${c.name[LANG]}">`,
    answer: c => c.continent[LANG],
    pool: () => CONTINENTS.map(x => x[LANG]),
  },
};

function startQuiz(type, levelKey) {
  const pool = poolForLevel(levelKey);
  const total = Math.min(QUESTIONS_PER_ROUND, pool.length);
  game = {
    type,
    levelKey,
    pool,
    countries: shuffle(pool).slice(0, total),
    index: 0,
    correct: 0,
    total,
  };
  $("q-total").textContent = total;
  show("screen-quiz");
  renderQuestion();
}

function renderQuestion() {
  const def = GAME_DEFS[game.type];
  const c = game.countries[game.index];
  $("q-num").textContent = game.index + 1;
  $("progress-fill").style.width = (game.index / game.total * 100) + "%";
  $("question-card").innerHTML = def.question(c);
  $("fact-area").innerHTML = "";

  const right = def.answer(c);
  const wrongs = shuffle([...new Set(def.pool(c))].filter(a => a !== right)).slice(0, 3);
  const opts = shuffle([right, ...wrongs]);

  $("options").innerHTML = "";
  opts.forEach(text => {
    const b = document.createElement("button");
    b.className = "opt";
    b.textContent = text;
    b.onclick = () => pick(b, text === right, c);
    $("options").appendChild(b);
  });

}

function pick(btn, isRight, country) {
  const def = GAME_DEFS[game.type];
  document.querySelectorAll(".opt").forEach(b => {
    b.disabled = true;
    if (b.textContent === def.answer(country)) b.classList.add("correct");
  });
  if (isRight) {
    game.correct++;
    burstConfetti(12);
    if (typeof playChime === "function") playChime();
  } else {
    btn.classList.add("wrong");
  }
  $("progress-fill").style.width = ((game.index + 1) / game.total * 100) + "%";
  $("fact-area").innerHTML = `
    <div class="reveal-chips">
      <span class="rc">📍 ${country.continent[LANG]}</span>
      <span class="rc">🏙️ ${country.capital[LANG]}</span>
    </div>
    <div class="fact-bubble">${isRight ? t("feedbackCorrect") : t("feedbackWrong")} 💡 ${country.fact[LANG]}</div>
    <div style="text-align:center"><button class="btn-next" onclick="nextQuestion()">${game.index + 1 < game.total ? t("nextQuestion") : t("toResults")}</button></div>`;
}

function nextQuestion() {
  game.index++;
  if (game.index >= game.total) return finishQuiz();
  renderQuestion();
}

function starsFor(correct, total) {
  const r = correct / total;
  return r >= 0.9 ? 3 : r >= 0.6 ? 2 : r >= 0.3 ? 1 : 0;
}

function finishQuiz() {
  const stars = starsFor(game.correct, game.total);
  showResult(game.type, stars, t("quizResultText")(game.correct, game.total));
}

/* ================= memory game ================= */
let mem = null;

function startMemory() {
  const chosen = shuffle(COUNTRIES).slice(0, 8);
  const cards = shuffle(chosen.flatMap(c => [
    { key: c.code, html: `<img src="${flagUrlSmall(c.code)}" alt="${c.name[LANG]}">` },
    { key: c.code, html: c.name[LANG] },
  ]));
  mem = { open: [], matched: 0, lock: false, moves: 0 };
  $("pairs-found").textContent = "0";
  const grid = $("memory-grid");
  grid.innerHTML = "";
  cards.forEach(card => {
    const b = document.createElement("button");
    b.className = "mem-card";
    b.dataset.key = card.key;
    b.innerHTML = `<div class="mem-inner">
        <div class="mem-face mem-front">🌍</div>
        <div class="mem-face mem-back">${card.html}</div>
      </div>`;
    b.onclick = () => flipCard(b);
    grid.appendChild(b);
  });
  show("screen-memory");
}

function flipCard(card) {
  if (mem.lock || card.classList.contains("flipped")) return;
  card.classList.add("flipped");
  mem.open.push(card);
  if (mem.open.length < 2) return;

  mem.moves++;
  const [a, b] = mem.open;
  mem.open = [];
  if (a.dataset.key === b.dataset.key) {
    a.classList.add("matched");
    b.classList.add("matched");
    mem.matched++;
    $("pairs-found").textContent = mem.matched;
    burstConfetti(10);
    if (typeof playChime === "function") playChime();
    if (mem.matched === 8) {
      setTimeout(() => {
        const stars = mem.moves <= 12 ? 3 : mem.moves <= 18 ? 2 : 1;
        showResult("memory", stars, t("memoryResultText")(mem.moves));
      }, 700);
    }
  } else {
    mem.lock = true;
    setTimeout(() => {
      a.classList.remove("flipped");
      b.classList.remove("flipped");
      mem.lock = false;
    }, 900);
  }
}

/* ================= results ================= */
let lastGame = null;

function showResult(type, stars, text) {
  lastGame = type;
  if (stars > store.get(type)) store.set(type, stars);
  $("result-stars").textContent = stars ? "⭐".repeat(stars) : "🌱";
  $("result-emoji").textContent = stars === 3 ? "🏆" : stars === 2 ? "🎉" : stars === 1 ? "💪" : "🌱";
  $("result-title").textContent =
    stars === 3 ? t("resultTitle3") :
    stars === 2 ? t("resultTitle2") :
    stars === 1 ? t("resultTitle1") : t("resultTitle0");
  $("result-text").textContent = text;
  show("screen-result");
  if (stars >= 2) burstConfetti(60);
}

$("btn-again").onclick = () => startGame(lastGame);

/* ================= confetti ================= */
const CONFETTI_COLORS = ["#D6553B","#2E7D96","#4C9166","#E0A83E","#A6567D"];
function burstConfetti(n) {
  for (let i = 0; i < n; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.style.left = Math.random() * 100 + "vw";
    el.style.width = el.style.height = (6 + Math.random() * 8) + "px";
    el.style.background = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
    el.style.animationDuration = (1.2 + Math.random() * 1.6) + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3200);
  }
}

/* ================= init ================= */
applyStaticTranslations();
renderHome();
